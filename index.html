<!DOCTYPE html>
<html>
<head>
  <title>Jam Analog & Digital</title>
  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
      transition: background 0.5s, color 0.5s;
    }
    canvas {
      background: #fff;
      display: block;
      margin: 30px auto;
      border: 8px solid #ff4d4d;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transition: background 0.5s, border 0.5s;
    }
    #digital {
      font-size: 24px;
      margin-top: 10px;
      font-weight: bold;
      color: #222;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      transition: color 0.5s;
    }
    #toggle {
      margin-top: 15px;
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    /* Mode Gelap */
    body.dark {
      background: linear-gradient(135deg, #2c3e50, #000000);
      color: #eee;
    }
    body.dark canvas {
      background: #222;
      border: 8px solid #00c3ff;
    }
    body.dark #digital {
      color: #eee;
      text-shadow: 0 0 5px #00c3ff;
    }
    body.dark #toggle {
      background: #eee;
      color: #000;
    }
  </style>
</head>
<body>
  <canvas id="clock" width="300" height="300"></canvas>
  <div id="digital"></div>
  <button id="toggle">🌙 Mode Gelap</button>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const toggleBtn = document.getElementById("toggle");

    function drawClock(){
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours();

      ctx.clearRect(0,0,300,300);

      // lingkaran jam
      ctx.beginPath();
      ctx.arc(150,150,140,0,2*Math.PI);
      ctx.stroke();

      // angka 1-12
      ctx.font = "16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for(let num=1; num<=12; num++){
        let ang = num * Math.PI/6;
        let x = 150 + Math.cos(ang - Math.PI/2) * 120;
        let y = 150 + Math.sin(ang - Math.PI/2) * 120;
        ctx.fillText(num.toString(), x, y);
      }

      // jarum jam
      let hrAng = ((hr%12) + min/60) * Math.PI/6;
      drawHand(hrAng, 70, 6, "black");

      // jarum menit
      let minAng = (min + sec/60) * Math.PI/30;
      drawHand(minAng, 100, 4, "black");

      // jarum detik
      let secAng = sec * Math.PI/30;
      drawHand(secAng, 110, 2, "red");

      // jam digital + hari + tanggal
      const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
      let dayName = days[now.getDay()];
      let date = now.getDate();
      let monthName = months[now.getMonth()];
      let year = now.getFullYear();

      let digitalTime = `${hr.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
      let fullDate = `${dayName}, ${date} ${monthName} ${year}`;

      digital.innerHTML = digitalTime + "<br>" + fullDate;
    }

    function drawHand(angle, length, width, color){
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      ctx.moveTo(150,150);
      ctx.lineTo(150 + length*Math.cos(angle - Math.PI/2),
                 150 + length*Math.sin(angle - Math.PI/2));
      ctx.stroke();
    }

    setInterval(drawClock,1000);

    // Toggle Dark Mode
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      toggleBtn.textContent = document.body.classList.contains("dark") ? "☀️ Mode Terang" : "🌙 Mode Gelap";
    });
  </script>
</body>
</html>
